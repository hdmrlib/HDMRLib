<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1600" height="900" viewBox="0 0 1600 900" version="1.1" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: 700 34px -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; fill:#222; }
      .label { font: 400 24px -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; fill:#333; }
      .small { font: 400 18px -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; fill:#555; }
      .method-title { font: 700 46px -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; fill:#2a2a2a; }
      .method-sub { font: 500 22px -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; fill:#383838; }
      .backend { font: 700 22px -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; fill:#2f2f2f; }
      .caption { font: 400 18px -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; fill:#444; }
    </style>

    <marker id="arrowYellow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 z" fill="#f0c543"/>
    </marker>

    <linearGradient id="methodGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff4bf"/>
      <stop offset="1" stop-color="#f3de78"/>
    </linearGradient>

    <linearGradient id="panelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffdf4"/>
      <stop offset="1" stop-color="#fbf4d5"/>
    </linearGradient>

    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#efe9cf"/>
      <stop offset="1" stop-color="#d8d3bc"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8d58a"/>
      <stop offset="1" stop-color="#d7bf5a"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c7cad3"/>
      <stop offset="1" stop-color="#a7acb7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1600" height="900" fill="#fafafa"/>

  <g id="title_group">
    <text class="title" x="800" y="75" text-anchor="middle">Figure 1: Overview of HDMR-Lib</text>
  </g>

  <g id="input_group">
    <g id="tensor_cube" transform="translate(110,250)" filter="url(#shadow)">
      <polygon points="0,70 110,35 250,35 140,70" fill="#f2efcf" stroke="#1e1e1e" stroke-width="1.5"/>
      <polygon points="0,70 140,70 140,190 0,155" fill="#3f8de0" stroke="#1e1e1e" stroke-width="1.5"/>
      <polygon points="140,70 250,35 250,155 140,190" fill="#f0b43c" stroke="#1e1e1e" stroke-width="1.5"/>

      <g stroke="#1e1e1e" stroke-width="0.8" opacity="0.75">
        <line x1="28" y1="61" x2="168" y2="61"/>
        <line x1="55" y1="52" x2="195" y2="52"/>
        <line x1="83" y1="43" x2="223" y2="43"/>
        <line x1="113" y1="35" x2="250" y2="35"/>
        <line x1="28" y1="61" x2="0" y2="70"/>
        <line x1="55" y1="52" x2="28" y2="61"/>
        <line x1="83" y1="43" x2="55" y2="52"/>
        <line x1="113" y1="35" x2="83" y2="43"/>
        <line x1="140" y1="70" x2="110" y2="35"/>
        <line x1="168" y1="61" x2="140" y2="70"/>
        <line x1="195" y1="52" x2="168" y2="61"/>
        <line x1="223" y1="43" x2="195" y2="52"/>
      </g>

      <g stroke="#1e1e1e" stroke-width="0.8" opacity="0.6">
        <line x1="0" y1="98" x2="140" y2="98"/>
        <line x1="0" y1="126" x2="140" y2="126"/>
        <line x1="0" y1="155" x2="140" y2="155"/>
        <line x1="35" y1="79" x2="35" y2="164"/>
        <line x1="70" y1="70" x2="70" y2="173"/>
        <line x1="105" y1="70" x2="105" y2="182"/>
      </g>

      <g stroke="#1e1e1e" stroke-width="0.8" opacity="0.6">
        <line x1="140" y1="98" x2="250" y2="63"/>
        <line x1="140" y1="126" x2="250" y2="91"/>
        <line x1="140" y1="155" x2="250" y2="120"/>
        <line x1="168" y1="61" x2="168" y2="181"/>
        <line x1="195" y1="52" x2="195" y2="173"/>
        <line x1="223" y1="43" x2="223" y2="164"/>
      </g>
    </g>
    <text class="label" x="230" y="500" text-anchor="middle">Tensor-valued function</text>
  </g>

  <g id="backend_group" filter="url(#shadow)">
    <rect x="560" y="120" rx="26" ry="26" width="520" height="118" fill="#ffffff" stroke="#e4e4e4" stroke-width="2"/>

    <g id="numpy_backend" transform="translate(620,152)">
      <rect x="0" y="0" rx="14" ry="14" width="115" height="56" fill="#ffffff" stroke="#d9d9d9" stroke-width="1.6"/>
      <g transform="translate(16,10)">
        <rect x="0" y="5" width="18" height="18" fill="#4a95e6" opacity="0.9" transform="skewY(-20)"/>
        <rect x="9" y="0" width="18" height="18" fill="#7db7f0" opacity="0.95" transform="skewY(-20)"/>
        <rect x="18" y="5" width="18" height="18" fill="#b7d7f8" opacity="0.95" transform="skewY(-20)"/>
      </g>
      <text class="backend" x="58" y="40" text-anchor="middle">NumPy</text>
    </g>

    <g id="pytorch_backend" transform="translate(764,152)">
      <rect x="0" y="0" rx="14" ry="14" width="140" height="56" fill="#ffffff" stroke="#d9d9d9" stroke-width="1.6"/>
      <g transform="translate(18,10)">
        <path d="M26,3 C18,7 14,13 14,20 C14,28 20,34 28,34 C37,34 44,27 44,18 C44,10 39,4 32,0"
              fill="none" stroke="#ee4c2c" stroke-width="4" stroke-linecap="round"/>
        <circle cx="28" cy="20" r="2.8" fill="#ee4c2c"/>
      </g>
      <text class="backend" x="84" y="40" text-anchor="middle">PyTorch</text>
    </g>

    <g id="tensorflow_backend" transform="translate(928,152)">
      <rect x="0" y="0" rx="14" ry="14" width="132" height="56" fill="#ffffff" stroke="#d9d9d9" stroke-width="1.6"/>
      <g transform="translate(16,9)" fill="#f5a623">
        <polygon points="0,8 15,0 45,0 30,8"/>
        <polygon points="15,0 30,8 30,36 15,28"/>
        <polygon points="30,8 45,0 45,28 30,36"/>
      </g>
      <text class="backend" x="75" y="40" text-anchor="middle">TensorFlow</text>
    </g>
  </g>

  <g id="methods_panel">
    <rect x="545" y="320" rx="24" ry="24" width="590" height="340"
          fill="url(#panelGrad)" stroke="#efcf64" stroke-width="2"
          stroke-dasharray="10 10"/>

    <g id="empr_group" filter="url(#shadow)">
      <rect x="610" y="370" rx="18" ry="18" width="330" height="120"
            fill="url(#methodGrad)" stroke="#d8ae2f" stroke-width="3"/>
      <text class="method-title" x="775" y="438" text-anchor="middle">EMPR</text>
      <text class="method-sub" x="775" y="474" text-anchor="middle">Tensor Decomposition</text>
    </g>

    <g id="hdmr_group" filter="url(#shadow)">
      <rect x="610" y="520" rx="18" ry="18" width="330" height="120"
            fill="url(#methodGrad)" stroke="#d8ae2f" stroke-width="3"/>
      <text class="method-title" x="775" y="588" text-anchor="middle">HDMR</text>
      <text class="method-sub" x="775" y="624" text-anchor="middle">High-Dimensional Model Representation</text>
    </g>
  </g>

  <g id="backend_connectors" stroke="#edc84a" stroke-width="2.2" opacity="0.9" stroke-dasharray="8 8">
    <line x1="677" y1="238" x2="677" y2="360"/>
    <line x1="834" y1="238" x2="834" y2="360"/>
    <line x1="994" y1="238" x2="994" y2="360"/>
  </g>

  <g id="flow_arrows" stroke="#f0c543" stroke-width="10" fill="none" marker-end="url(#arrowYellow)">
    <line x1="360" y1="430" x2="575" y2="430"/>
    <line x1="360" y1="580" x2="575" y2="580"/>
  </g>

  <g id="output_arrows" stroke="#f0c543" stroke-width="10" fill="none" marker-end="url(#arrowYellow)">
    <line x1="945" y1="430" x2="1245" y2="430"/>
    <line x1="945" y1="580" x2="1245" y2="580"/>
  </g>

  <g id="output_group">
    <g id="reconstruction_group">
      <line x1="1260" y1="470" x2="1460" y2="470" stroke="#636363" stroke-width="4"/>
      <line x1="1260" y1="330" x2="1260" y2="470" stroke="#636363" stroke-width="4"/>
      <rect x="1288" y="380" width="28" height="90" fill="#ead587" opacity="0.75"/>
      <rect x="1320" y="360" width="28" height="110" fill="#ead587" opacity="0.4"/>
      <rect x="1352" y="396" width="28" height="74" fill="#ead587" opacity="0.35"/>
      <rect x="1384" y="404" width="28" height="66" fill="#ead587" opacity="0.3"/>
      <rect x="1416" y="350" width="28" height="120" fill="#ead587" opacity="0.75"/>
      <path d="M1268,414 C1300,340 1332,330 1364,385 S1430,432 1452,372"
            fill="none" stroke="#2f2f2f" stroke-width="4.5" stroke-dasharray="12 9"/>
      <text class="label" x="1360" y="510" text-anchor="middle">Reconstruction</text>
    </g>

    <g id="components_group">
      <line x1="1260" y1="645" x2="1460" y2="645" stroke="#636363" stroke-width="4"/>
      <rect x="1275" y="620" width="28" height="25" fill="url(#bar1)" stroke="#7d7d7d" stroke-width="1"/>
      <rect x="1320" y="585" width="28" height="60" fill="url(#bar1)" stroke="#7d7d7d" stroke-width="1"/>
      <rect x="1365" y="540" width="28" height="105" fill="url(#bar2)" stroke="#7d7d7d" stroke-width="1"/>
      <rect x="1410" y="565" width="28" height="80" fill="url(#bar3)" stroke="#7d7d7d" stroke-width="1"/>
      <rect x="1455" y="605" width="28" height="40" fill="url(#bar1)" stroke="#7d7d7d" stroke-width="1"/>
      <text class="label" x="1365" y="705" text-anchor="middle">Component Functions</text>
    </g>
  </g>

  <g id="hierarchy_note" opacity="0.9">
    <text class="small" x="985" y="684" text-anchor="end">order 1, 2, ...</text>
  </g>

  <g id="caption_group">
    <text class="caption" x="72" y="805">
      <tspan font-weight="700">Figure 1: Overview of HDMR-Lib.</tspan>
      <tspan> A tensor-valued function is processed by either the EMPR or HDMR model under a selectable</tspan>
    </text>
    <text class="caption" x="72" y="832">
      <tspan>numerical backend. The library returns a reconstructed approximation and the associated decomposition</tspan>
    </text>
    <text class="caption" x="72" y="859">
      <tspan>components for interaction analysis.</tspan>
    </text>
  </g>
</svg>

name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  numpy-tests:
    name: NumPy tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11"]
    env:
      MPLCONFIGDIR: /tmp/matplotlib
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements*.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install test dependencies
        run: python -m pip install ".[dev]"

      - name: Run pytest
        run: python -m pytest

  full-backend-tests:
    name: Full backend tests (torch + tensorflow)
    runs-on: ubuntu-latest
    needs: numpy-tests
    env:
      MPLCONFIGDIR: /tmp/matplotlib
      TF_CPP_MIN_LOG_LEVEL: "2"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements*.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install all backends and test dependencies
        run: python -m pip install ".[dev,all]"

      - name: Run pytest with coverage
        run: python -m pytest --cov=hdmrlib --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error
